/*
 * Quern Android Driver
 * Forked from openatx/android-uiautomator-server (MIT License)
 *
 * Minimal APK providing AdbKeyboard IME for Unicode text input
 * via uiautomator2. All other features from the original project
 * have been stripped.
 */

apply plugin: 'com.android.application'

android {
    namespace "com.github.uiautomator"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.github.uiautomator"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 100
        versionName "1.0.0-quern"
    }

    signingConfigs {
        release {
            storeFile file("../release.keystore")
            storePassword "uiautomator-release-2015"
            keyAlias "uiautomator"
            keyPassword "uiautomator"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    lint {
        abortOnError false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.2.0'
}
